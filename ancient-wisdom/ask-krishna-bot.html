        function escapeHtml(value) {
            return String(value)
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#039;');
        }

        function normalizeMessage(message) {
            return message.toLowerCase().replace(/\s+/g, ' ').trim();
        }

        function addMessage(text, isUser = false, options = {}) {
            const chatContainer = document.getElementById('chat-messages');
            const shouldSave = options.save !== false;
            const renderedText = isUser ? escapeHtml(text) : text;
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `flex ${isUser ? 'justify-end' : 'justify-start'} chat-bubble`;

        function escapeRegExp(value) {
            return String(value).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        function keywordMatches(message, keyword) {
            if (keyword.includes(' ')) {
                return message.includes(keyword);
            }

            const pattern = new RegExp(`(^|[^a-z])${escapeRegExp(keyword)}([^a-z]|$)`);
            return pattern.test(message);
        }

        function detectTopic(message) {
            const msg = normalizeMessage(message);
            const priorityTopic = detectPriorityTopic(msg);

            if (priorityTopic) {
                return priorityTopic;
            }

            let bestTopic = null;
            let bestScore = 0;

            Object.entries(topicKeywords).forEach(([topic, keywords]) => {
                const score = keywords.reduce((total, keyword) => {
                    if (!keywordMatches(msg, keyword)) return total;
                    return total + (keyword.includes(' ') ? 3 : 1);
                }, 0);

                if (score > bestScore) {
                    bestTopic = topic;
                    bestScore = score;
                }
            });

            return bestScore > 0 ? bestTopic : null;
        }

        function detectPriorityTopic(message) {
            if (isSeriousDistressConcern(message)) return 'distress';
            if (isTradingConcern(message)) return 'trading';
            if (isFamilyProvisionConcern(message)) return 'money';
            if (isAIJobConcern(message)) return 'aiJob';
            if (isAIConcern(message)) return 'ai';
            return null;
        }

        function isFamilyProvisionConcern(message) {
            const msg = normalizeMessage(message);
            const hasFamily = ['family', 'wife', 'husband', 'children', 'kids', 'parents', 'mother', 'father'].some(word => keywordMatches(msg, word));
            const hasProvisionNeed = [
                'money',
                'less money',
                'not enough money',
                'take care',
                'support',
                'provide',
                'feed',
                'pay',
                'rent',
                'bills',
                'expenses',
                'income',
                'job',
                'salary'
            ].some(word => keywordMatches(msg, word));

            return hasFamily && hasProvisionNeed;
        }

        function isAIConcern(message) {
            const msg = normalizeMessage(message);
            return [
                'ai',
                'artificial intelligence',
                'chatgpt',
                'automation',
                'machine learning',
                'llm',
                'ai tools',
                'replaced by ai',
                'ai will take my job'
            ].some(word => keywordMatches(msg, word));
        }

        function isAIJobConcern(message) {
            const msg = normalizeMessage(message);
            const hasAI = [
                'ai',
                'artificial intelligence',
                'chatgpt',
                'automation',
                'machine learning',
                'job automation',
                'replaced by ai'
            ].some(word => keywordMatches(msg, word));
            const hasJobRisk = [
                'job',
                'career',
                'work',
                'role',
                'profession',
                'salary',
                'take over',
                'replace',
                'replaced',
                'lose my job',
                'job loss',
                'no influence',
                'no control',
                'cannot control',
                'out of my control'
            ].some(word => keywordMatches(msg, word));

            return hasAI && hasJobRisk;
        }

        function isAIJobControlConcern(message) {
            const msg = normalizeMessage(message);
            return isAIJobConcern(msg) && [
                'no influence',
                'no control',
                'cannot control',
                'out of my control',
                'take over',
                'replace',
                'replaced',
                'lose my job',
                'job loss'
            ].some(word => keywordMatches(msg, word));
        }

        function isTradingConcern(message) {
            const msg = normalizeMessage(message);
            const tradingWords = [
                'trading',
                'trade',
                'trader',
                'stock market',
                'stocks',
                'crypto',
                'bitcoin',
                'options',
                'forex',
                'futures',
                'market volatility',
                'portfolio',
                'stop loss',
                'revenge trade',
                'risk management'
            ];
            const financePressureWords = ['loss', 'losses', 'profit', 'fomo', 'greed', 'fear', 'money', 'invest', 'investment', 'investing'];

            return tradingWords.some(word => keywordMatches(msg, word)) &&
                (financePressureWords.some(word => keywordMatches(msg, word)) || msg.split(' ').length <= 8);
        }

        function isSeriousDistressConcern(message) {
            const msg = normalizeMessage(message);
            return [
                'suicide',
                'suicidal',
                'kill myself',
                'hurt myself',
                'end my life',
                'cannot go on',
                "can't go on",
                'no reason to live'
            ].some(word => keywordMatches(msg, word));
        }

        function isGreeting(message) {
            const msg = normalizeMessage(message);
            const hasGreeting = [
                'hi',
                'hello',
                'hey',
                'namaste',
                'hare krishna',
                'radhe radhe',
                'good morning',
                'good afternoon',
                'good evening'
            ].some(greeting => keywordMatches(msg, greeting));

            return hasGreeting && msg.split(' ').length <= 8;
        }

        function isGratitude(message) {
            const msg = normalizeMessage(message);
            return ['thank you', 'thanks', 'grateful', 'gratitude', 'appreciate'].some(phrase => keywordMatches(msg, phrase));
        }

        function isFollowUp(message) {
            const msg = normalizeMessage(message);
            if (!conversationState.lastTopic) return false;

            const followUpPhrases = [
                'tell me more',
                'go deeper',
                'explain',
                'further',
                'more',
                'detail',
                'elaborate',
                'why',
                'how do i',
                'how can i',
                'what should i do',
                'what now',
                'next step',
                'yes',
                'please continue',
                'continue',
                'this',
                'that',
                'it'
            ];

            return followUpPhrases.some(phrase => keywordMatches(msg, phrase)) || msg.split(' ').length <= 4;
        }

        function buildWisdom(topic, overrides = {}) {
            return {
                topic,
                ...gitaWisdom[topic],
                ...overrides
            };
        }

        function rememberWisdom(topic, wisdom, userMessage) {
            conversationState.lastWisdom = wisdom;
            conversationState.lastUserMessage = userMessage;
            conversationState.turnCount += 1;

            if (!['greeting', 'gratitude'].includes(topic)) {
                conversationState.lastTopic = topic;
            }

            return wisdom;
        }

        function getTopicWisdom(topic, userMessage) {
            const msg = normalizeMessage(userMessage);
            const openings = {
                stress: "I hear the pressure in this. Let us separate your duty from the result, because that is where peace begins.",
                fear: "Fear becomes smaller when you remember that the situation is not larger than the Self within you.",
                failure: "A setback can hurt, but it does not define your worth. Let us make it useful instead of personal.",
                grief: "Loss is tender. I will not rush you past it. The Gita begins by meeting grief with truth and compassion.",
                relationship: "Relationships show us where attachment, expectation, and love are tangled together. We can untangle them gently.",
                anger: "Anger is a fire signal. It is asking you to pause before it starts making decisions for you.",
                purpose: "When purpose feels unclear, return to your nature. Your path is usually closer than your comparison allows you to see.",
                decision: "Confusion asks for a quieter mind, not a louder argument. We will look from steadiness.",
                money: "Work and money matter, but they become lighter when your work is offered with dignity instead of fear.",
                health: "Care for the body with tenderness, while remembering you are more than the body.",
                ego: "Ego contracts the heart. Humility does not make you small; it makes you clear.",
                loneliness: "Feeling alone is painful. Let us begin by remembering that loneliness is a state passing through you, not the truth of who you are.",
                selfDoubt: "Doubt speaks loudly when the mind forgets its own strength. We will answer it with one steady action.",
                procrastination: "The mind is waiting for perfect readiness. Krishna asks for right action now, even if the beginning is small.",
                habits: "A craving becomes weaker when you stop feeding it with attention and start protecting your environment.",
                study: "Learning needs steadiness more than panic. Gather the mind, and the knowledge comes closer.",
                ai: "AI can be useful, but it should sit in the passenger seat. Your conscience, intelligence, and dharma must drive.",
                aiJob: "This worry is really about agency: what can you do when the world changes without asking your permission?",
                trading: "Markets can shake the mind quickly. Before profit, protect clarity, discipline, and your family's stability.",
                distress: "I am glad you said this out loud. Heavy pain should not be carried alone.",
                general: "I am with you in this. When the mind is crowded, begin with surrender and one honest next step."
            };

            const wisdom = buildWisdom(topic, { opening: openings[topic] || openings.general });

            if (topic === 'money' && isFamilyProvisionConcern(userMessage)) {
                wisdom.opening = "I hear the worry beneath this: you are not asking for luxury, you are trying to protect and care for your family.";
                wisdom.explanation = "Krishna would not shame you for feeling pressure here. Providing for family is part of dharma. The teaching is to act steadily without letting fear decide for you: look honestly at what is needed, use your skills, ask for help where needed, and take the next practical step without losing your inner dignity.";
                wisdom.action = "Today, write three columns: urgent family needs, money available, and one income/help action you can take in the next 24 hours. Then do the smallest action first, such as calling someone, applying for one job, asking for a payment extension, or cutting one non-essential cost.";
            }

            if (topic === 'aiJob' && isAIJobControlConcern(userMessage)) {
                wisdom.opening = "I hear the helplessness in this: AI may change your job, and you may not have direct influence over that decision.";
                wisdom.explanation = "Krishna's teaching is not to deny what you cannot control. It is to stop giving your whole strength to what you cannot control. You may not decide the direction of an industry, but you can decide your preparation, your adaptability, your honesty at work, and the skills you build next.";
                wisdom.action = "Draw two circles today: 'Not in my control' and 'In my control.' Put AI adoption and company decisions in the first. Put learning one AI workflow, documenting your value, talking to your manager, updating your resume, and building one backup option in the second. Act only from the second circle today.";
            }

            if (topic === 'general' && msg.length > 20) {
                wisdom.explanation = "I may not have a perfect label for this, but the teaching still applies: bring the problem into awareness, offer it upward, and act from the calmest part of yourself.";
                wisdom.action = "Write your worry in one sentence. Then ask: 'What is the one dharmic action I can take today?' Do only that first.";
            }

            return wisdom;
        }

        function getFollowUpWisdom(topic, userMessage) {
            const followUps = {
                stress: {
                    opening: "Yes. Stay with the exact place where stress starts: the mind jumps from action to outcome.",
                    explanation: "Krishna is not asking you to stop caring. He is asking you to stop handing your peace to something you cannot fully control. Your domain is effort, honesty, preparation, and timing. The result belongs to a wider order.",
                    action: "Name one result you are clinging to. Then name one action you can take today. Put your energy only into the action for the next hour."
                },
                fear: {
                    opening: "Let us look at the fear without becoming the fear.",
                    explanation: "Fear often says, 'I am protecting you,' but it also exaggerates the future. Krishna points you back to the witnessing Self, the part of you that can notice fear without being ruled by it.",
                    action: "Place one hand on your chest. Breathe slowly and say: 'Fear is present, but I am the witness of fear.' Then choose one small, grounded action."
                },
                failure: {
                    opening: "Go deeper here: failure is an event, not an identity.",
                    explanation: "The Gita trains you to act without being destroyed by results. If the result was painful, gather its lesson, repair what can be repaired, and begin again without self-hatred.",
                    action: "Write: 'This failed because...' and 'Next time I will...' Keep it practical. No insults toward yourself."
                },
                grief: {
                    opening: "Grief needs both tenderness and truth.",
                    explanation: "Krishna does not deny sorrow; He teaches Arjuna from inside sorrow. Love is not erased by physical separation. Let grief move, but do not conclude that love has ended.",
                    action: "Spend five quiet minutes remembering one blessing this person or chapter gave you. Let tears come if they come."
                },
                relationship: {
                    opening: "The next layer is to ask: am I loving, grasping, or trying to control?",
                    explanation: "Krishna's equal vision does not mean accepting harm. It means seeing clearly: the soul in the other person, and the dignity of your own soul too. Compassion and boundaries can stand together.",
                    action: "Before your next message or conversation, write the truth in one calm sentence. Remove blame. Keep the boundary."
                },
                anger: {
                    opening: "Anger becomes dangerous when it takes the throne before wisdom speaks.",
                    explanation: "Krishna describes anger as a chain: anger clouds memory, memory clouds intelligence, and intelligence loses direction. The practice is to interrupt the chain early.",
                    action: "Delay your next reaction by 90 seconds. Breathe out longer than you breathe in. Then decide whether silence, a boundary, or a clear sentence is needed."
                },
                purpose: {
                    opening: "Purpose is not always a lightning bolt. Often it is a pattern in what repeatedly calls your attention.",
                    explanation: "Swadharma means your own way of serving life. It may be imperfect and still be yours. Comparison makes another person's path look cleaner than your own beginning.",
                    action: "List three activities that make you feel useful, alive, or quietly absorbed. Choose one and give it thirty focused minutes this week."
                },
                decision: {
                    opening: "For this decision, do not ask only what is easier. Ask what is cleaner.",
                    explanation: "A sattvic decision usually leaves the mind clearer even if the work is harder. A restless decision may feel urgent but leaves agitation behind.",
                    action: "Imagine choosing each option. Which one gives more quiet dignity after the first wave of fear passes? Start there."
                },
                money: {
                    opening: "Money questions become heavier when they mix survival, status, and self-worth into one knot.",
                    explanation: "Krishna's teaching is to work well, serve well, and not let gain or loss decide your inner value. Practical planning and spiritual steadiness belong together.",
                    action: "Choose one practical money action today: update a resume, reduce one expense, send one proposal, or finish one useful task."
                },
                health: {
                    opening: "Care for the body as a sacred instrument, not as your entire identity.",
                    explanation: "The Gita does not ask you to neglect the body. It asks you to hold it wisely: with discipline, compassion, and less panic.",
                    action: "Do one kind thing for your body in the next hour: water, food, rest, movement, or a medical appointment if needed."
                },
                ego: {
                    opening: "Ego often speaks as comparison: above others, below others, or separate from others.",
                    explanation: "Equal vision softens comparison. You can still use your gifts, but they become offerings rather than proof that you are superior or inferior.",
                    action: "Today, quietly appreciate someone else's strength without turning it into a judgment about yourself."
                },
                loneliness: {
                    opening: "Go gently here. Loneliness asks for both inner steadiness and real human contact.",
                    explanation: "Krishna's teaching does not say you need no one. It says your worth does not disappear when people are absent. From that steadier place, you can reach out without shame.",
                    action: "Choose one low-pressure contact: a message, a walk near people, a community group, or calling a family member. Make the contact small enough that you actually do it."
                },
                selfDoubt: {
                    opening: "The next layer is this: do not argue with doubt all day. Give it evidence.",
                    explanation: "The mind trusts repeated action more than repeated reassurance. Krishna asks you to lift yourself by training the mind through small, completed duties.",
                    action: "Pick one promise you can keep today. Keep it before sleeping. Let that be today's proof."
                },
                procrastination: {
                    opening: "Procrastination usually protects you from discomfort, but it also steals your strength.",
                    explanation: "If you wait for motivation, the mind remains master. If you begin a small duty, the mind slowly becomes your helper.",
                    action: "Make the first step so small it feels almost silly: open the file, write one sentence, clean one corner, read one page. Begin there."
                },
                habits: {
                    opening: "Cravings rise like waves. A wave feels powerful, but it also passes.",
                    explanation: "Krishna maps the chain of attachment so you can interrupt it early. You do not need to defeat your whole life today; you need to protect the next choice.",
                    action: "When the urge rises, delay for 10 minutes and change location. During that delay, breathe, drink water, or message someone safe."
                },
                study: {
                    opening: "For study, calm repetition beats anxious intensity.",
                    explanation: "Knowledge enters a mind that returns again and again. Do not measure your worth by one exam. Measure today's dharma by focused effort.",
                    action: "Use one cycle: 25 minutes study, 5 minutes break, then 3 lines from memory. Repeat only if the mind is still clear."
                },
                ai: {
                    opening: "The deeper question is not whether AI is powerful. It is whether you remain awake while using it.",
                    explanation: "Let AI handle drafts, options, and repetition, but keep human responsibility for truth, compassion, and final judgment. A tool can assist dharma; it cannot become dharma.",
                    action: "Before using AI, define the decision you will still make yourself. After using it, verify facts and ask: 'Is this honest, useful, and kind?'"
                },
                aiJob: {
                    opening: "Go one layer deeper: uncertainty is asking you to become skillful, not frozen.",
                    explanation: "Krishna would guide you toward karma yoga here: act fully in the present duty, without being mentally chained to the future result. Learn the tool, strengthen the human parts of your work, and prepare options calmly.",
                    action: "For the next 7 days, spend 30 minutes daily learning one AI workflow connected to your job. Also write one example of value you bring that AI alone does not: judgment, empathy, domain knowledge, taste, accountability, or trust."
                },
                trading: {
                    opening: "Trading requires a calm mind more than a clever prediction.",
                    explanation: "When greed or fear leads, the trade is already polluted. This is not financial advice. Spiritually, the discipline is to avoid compulsion, protect capital, and never let market emotion rule your duty.",
                    action: "If you already broke your plan today, stop trading for the day. Review the mistake only after the body is calm."
                },
                distress: {
                    opening: "Stay with me for this moment. The next step is safety, not philosophy.",
                    explanation: "When the mind is in deep pain, it can lie and say the pain is permanent. Please bring another human into this now if there is any risk of harm.",
                    action: "If you are in immediate danger, call emergency services now. If not, contact one trusted person and stay near others until the wave passes."
                },
                general: {
                    opening: "Let us go one layer deeper without forcing an answer.",
                    explanation: "When the mind cannot solve everything at once, Krishna asks for surrender, steadiness, and right action. You do not need the whole road to take the next dharmic step.",
                    action: "Ask: 'What is mine to do now, and what must I release?' Write both answers. Act only on the first."
                }
            };

            return buildWisdom(topic, followUps[topic] || followUps.general);
        }

        function getGreetingWisdom() {
            conversationState.greeted = true;

            return {
                topic: 'greeting',
                opening: conversationState.turnCount > 0 ? "Namaste. I am still here with you." : "Namaste. I am here with you.",
                verse: "I am the Self, O Gudakesha, seated in the hearts of all beings.",
                chapter: "Bhagavad Gita 10.20",
                explanation: "Speak simply. You do not need to sound spiritual or perfect. Share what is actually happening in your mind, and I will answer from the Gita.",
                action: "Tell me what you are facing today: stress, fear, grief, anger, loneliness, habits, study, AI, trading, money, health, or a decision."
            };
        }

        function getGratitudeWisdom() {
            return {
                topic: 'gratitude',
                opening: "You are welcome. Let the teaching become practice now.",
                verse: "A lamp does not flicker in a windless place.",
                chapter: "Bhagavad Gita 6.19",
                explanation: "Peace grows when you return to the teaching again and again, even in small ways.",
                action: "Carry one line with you today: 'I will act with steadiness, and release what is not mine to control.'"
            };
        }

        function getGitaResponse(userMessage) {
            const topic = detectTopic(userMessage);

            if (isGreeting(userMessage) && !topic) {
                return rememberWisdom('greeting', getGreetingWisdom(), userMessage);
            }

            if (isGratitude(userMessage) && !topic) {
                return rememberWisdom('gratitude', getGratitudeWisdom(), userMessage);
            }

            if (topic) {
                return rememberWisdom(topic, getTopicWisdom(topic, userMessage), userMessage);
            }

            if (isFollowUp(userMessage)) {
                const followUpTopic = conversationState.lastTopic || 'general';
                return rememberWisdom(followUpTopic, getFollowUpWisdom(followUpTopic, userMessage), userMessage);
            }

            return rememberWisdom('general', getTopicWisdom('general', userMessage), userMessage);
        }

        function formatWisdomResponse(wisdom) {
            const opening = wisdom.opening ? `${escapeHtml(wisdom.opening)}<br><br>` : '';

            return `
                ${opening}
                <strong>${escapeHtml(wisdom.chapter)}</strong><br><br>
                <span class="verse-highlight">"${escapeHtml(wisdom.verse)}"</span><br><br>
                <strong>Explanation:</strong> ${escapeHtml(wisdom.explanation)}<br><br>
                <strong>Practical Wisdom:</strong> ${escapeHtml(wisdom.action)}
            `;
        }

        function getFollowUpPrompt(wisdom) {
            if (wisdom.topic === 'greeting') {
                return "What is on your mind today?";
            }

            const label = topicLabels[wisdom.topic] || 'this';
            return `You can ask "tell me more" to go deeper on ${label}, or share the next detail.`;
        }

        function setRespondingState(nextState) {
            isResponding = nextState;

            const input = document.getElementById('user-input');
            const sendButton = document.getElementById('send-btn');
            const quickButtons = document.querySelectorAll('button[onclick^="quickQuestion"]');

            if (input) input.disabled = nextState;
            if (sendButton) sendButton.disabled = nextState;

            quickButtons.forEach(button => {
                button.disabled = nextState;
                button.classList.toggle('opacity-50', nextState);
                button.classList.toggle('cursor-not-allowed', nextState);
            });
        }

        function respondToUserMessage(message) {
            if (!message || isResponding) return;

            addMessage(message, true);
            setRespondingState(true);
            showTypingIndicator();

            const delay = Math.min(1700, 850 + (message.length * 8));

            setTimeout(() => {
                try {
                    removeTypingIndicator();

                    const wisdom = getGitaResponse(message);
                    addMessage(formatWisdomResponse(wisdom), false);

                    setTimeout(() => {
                        addMessage(getFollowUpPrompt(wisdom), false, { save: false });
                        setRespondingState(false);

                        const input = document.getElementById('user-input');
                        if (input) input.focus();
                    }, 700);
                } catch (error) {
                    console.error('Ask Krishna bot response failed:', error);
                    removeTypingIndicator();
                    addMessage("I am sorry, something interrupted the response. Please ask again in a simple sentence.", false, { save: false });
                    setRespondingState(false);
                }
            }, delay);
        }

        function sendMessage() {
            const input = document.getElementById('user-input');
            const message = input.value.trim();

            if (!message || isResponding) return;

            input.value = '';
            respondToUserMessage(message);
        }

        function quickQuestion(question) {
            respondToUserMessage(question);
        }

        // Voice Input
        function startVoiceInput() {
            if (isResponding || isListening) return;

            const voiceBtn = document.getElementById('voice-btn');
            
            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                addMessage("Voice input is not supported in this browser. Please type your question, and I will stay with you there.", false, { save: false });
                return;
            }
            
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            const recognition = new SpeechRecognition();
            
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'en-US';
            
            isListening = true;
            voiceBtn.innerHTML = '<i class="fa-solid fa-microphone-slash text-red-400 text-xl"></i>';
            voiceBtn.classList.add('!bg-red-500/20', '!border-red-500');
            
            recognition.onresult = function(event) {
                const transcript = event.results[0][0].transcript;
                document.getElementById('user-input').value = transcript;
                
                // Auto send after voice input
                setTimeout(() => {
                    sendMessage();
                }, 600);
            };
            
            recognition.onerror = function() {
                addMessage("I could not hear that clearly. Please try the microphone again or type the question.", false, { save: false });
                resetVoiceButton();
            };
            
            recognition.onend = function() {
                resetVoiceButton();
            };
            
            recognition.start();
            
            function resetVoiceButton() {
                isListening = false;
                voiceBtn.innerHTML = '<i class="fa-solid fa-microphone text-xl"></i>';
                voiceBtn.classList.remove('!bg-red-500/20', '!border-red-500');
            }
        }
        
        // Initialize Chat
        function initializeChat() {
            const chatContainer = document.getElementById('chat-messages');
            
            // Welcome message from Krishna
            setTimeout(() => {
                const welcomeMsg = `
                    Namaste, my child.<br><br>
                    I am Krishna. Whatever is troubling you — stress, fear, confusion, or pain — I have already answered it in the Bhagavad Gita.<br><br>
                    Speak your heart. I am listening.
                `;
                addMessage(welcomeMsg, false, { save: false });
            }, 800);
            
            // Add initial greeting
            setTimeout(() => {
                addMessage("You can type your problem or use the microphone button to speak.", false, { save: false });
            }, 2200);
        }
        
        // Initialize everything
        window.onload = function() {
            initializeChat();
            
            // Add subtle breathing animation to avatar
            const avatar = document.querySelector('.krishna-avatar');
            if (avatar) {
                avatar.style.animation = 'divine-glow 4s ease-in-out infinite';
            }
        };
    </script>
</body>
</html>
