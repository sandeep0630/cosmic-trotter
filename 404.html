<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 • Lost in the Cosmos • CosmicTrotter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha384-t1nt8BQoYMLFN5p42tRAtuAAFQaCQODekUVeKKZrEnEyp4H2R0RHFz0KWpmj7i8g" crossorigin="anonymous">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #0a0a0f;
            color: #e0e7ff;
        }
        .font-display {
            font-family: 'Space Grotesk', 'Inter', sans-serif;
            font-weight: 600;
        }
        .cosmic-bg {
            background: radial-gradient(circle at center, #1a1a2e 0%, #0a0a0f 70%);
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite ease-in-out;
            box-shadow: 0 0 4px rgba(255,255,255,0.8);
        }
        @keyframes twinkle {
            0%,100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
        .cosmic-card {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(0, 243, 255, 0.1);
        }
    </style>
    <script src="theme-toggle.js?v=20260616-light-5"></script>
</head>
<body class="cosmic-bg min-h-screen flex items-center justify-center relative overflow-hidden">
    <!-- Stars background -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div class="star" style="width:2px;height:2px;top:12%;left:15%;animation-delay:0s"></div>
        <div class="star" style="width:1.5px;height:1.5px;top:22%;left:82%;animation-delay:1.1s"></div>
        <div class="star" style="width:3px;height:3px;top:35%;left:8%;animation-delay:2.4s"></div>
        <div class="star" style="width:2px;height:2px;top:68%;left:75%;animation-delay:0.6s"></div>
        <div class="star" style="width:1px;height:1px;top:82%;left:25%;animation-delay:3.1s"></div>
        <div class="star" style="width:2.5px;height:2.5px;top:55%;left:92%;animation-delay:1.7s"></div>
    </div>

    <div class="max-w-md mx-auto px-6 text-center relative z-10">
        <div class="mb-6">
            <div class="inline-flex items-center justify-center w-20 h-20 rounded-full border border-white/10 bg-white/5 mb-6">
                <i class="fa-solid fa-meteor text-4xl text-[#00f3ff]"></i>
            </div>
        </div>

        <div class="text-[120px] font-display font-bold tracking-[-8px] leading-none text-white/90 mb-2">404</div>
        <h1 class="text-3xl sm:text-4xl font-semibold tracking-tighter mb-3">Lost in the Cosmos</h1>
        <p class="text-lg text-white/70 mb-8 max-w-sm mx-auto">The page you seek has drifted into another dimension. Perhaps it was never meant to be found… or the map was written in stardust.</p>

        <div class="flex flex-col sm:flex-row gap-3 justify-center">
            <a href="/" class="inline-flex items-center justify-center gap-x-2 px-8 py-3.5 bg-white text-black font-semibold rounded-2xl hover:bg-white/90 active:scale-[0.985] transition-all">
                <i class="fa-solid fa-home"></i>
                <span>Return to Home</span>
            </a>
            <a href="/ancient.html" class="inline-flex items-center justify-center gap-x-2 px-8 py-3.5 border border-white/30 hover:bg-white/5 rounded-2xl font-medium transition-all">
                <i class="fa-solid fa-landmark"></i>
                <span>Explore Ancient Wisdom</span>
            </a>
        </div>

        <div class="mt-10 text-[10px] uppercase tracking-[3px] text-white/40">
            CosmicTrotter • The map is not the territory
        </div>
    </div>

    <script>
        // Subtle random star movement on desktop only (perf)
        if (window.innerWidth > 768) {
            setTimeout(() => {
                document.querySelectorAll('.star').forEach((s, i) => {
                    s.style.transition = 'transform 8s ease-in-out';
                    setInterval(() => {
                        const x = (Math.random() - 0.5) * 18;
                        const y = (Math.random() - 0.5) * 18;
                        s.style.transform = `translate(${x}px, ${y}px)`;
                    }, 4200 + i * 300);
                });
            }, 800);
        }
    </script>
    <script src="ask-krishna-widget.js"></script>
</body>
</html>
